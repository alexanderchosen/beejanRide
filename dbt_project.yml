name: 'beejanRide'
version: '1.0.0'

profile: 'beejanRide'

# File path configuration
model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

clean-targets:
  - "target"
  - "dbt_packages"


# -----------------------------------------------------------------------
# MODEL CONFIGURATION
# -----------------------------------------------------------------------
# Folder-level defaults applied via +config.
# Individual models override these in their own {{ config() }} blocks
# when they differ from the folder default (e.g. incremental models).
#
# Schema routing:
#   Each layer lands in its own BigQuery dataset, keeping staging,
#   intermediate, and mart tables cleanly separated in the warehouse.
#   Dataset names follow the pattern: <target_schema>_<+schema>
#   e.g. if target schema is 'beejanride', staging lands in 'beejanride_staging'
# -----------------------------------------------------------------------

models:
  beejanRide:

    staging:
      +materialized: view        # staging models are views — no storage cost,
      +schema: staging           # always reflect latest source data
      +tags: ['staging']

    intermediate:
      +materialized: table       # default for intermediate — incremental models
      +schema: intermediate      # override this in their own {{ config() }} blocks
      +tags: ['intermediate']

    marts:

      core:
        +materialized: table     # dims and facts — full refresh by default
        +schema: core            # incremental facts override in {{ config() }}
        +tags: ['core']

      finance:
        +materialized: table     # default — mart_daily_revenue overrides to incremental
        +schema: finance
        +tags: ['finance']

      operations:
        +materialized: table     # all operations marts are full table refresh
        +schema: operations
        +tags: ['operations']

      fraud:
        +materialized: table     # default — mart_fraud_monitoring overrides to incremental
        +schema: fraud
        +tags: ['fraud']


# -----------------------------------------------------------------------
# SNAPSHOT CONFIGURATION
# -----------------------------------------------------------------------
# Global snapshot defaults — individual snapshots inherit these and only
# need to define strategy, unique_key, and updated_at in their own config.
# Adding more snapshots in future (e.g. riders_snapshot) will automatically
# inherit target_schema and invalidate_hard_deletes from here.
# -----------------------------------------------------------------------

snapshots:
  beejanRide:
    +target_schema: snapshots
    +invalidate_hard_deletes: true


# -----------------------------------------------------------------------
# SEED CONFIGURATION
# -----------------------------------------------------------------------
seeds:
  beejanRide:
    +schema: seeds


# -----------------------------------------------------------------------
# FLAGS
# -----------------------------------------------------------------------
flags:
  bigquery_use_batch_source_freshness: true
version: 2

models:

  # TRIPS_METRICS
  - name: trips_metrics
    description: "Trip-level enriched model"
    columns:
      - name: trip_id
        description: "Primary key — one row per trip"
        data_tests:
          - not_null
          - unique

      - name: rider_id
        description: "FK to stg_riders"
        data_tests:
          - not_null
          - relationships:
              arguments:
                field: rider_id
                to: ref('stg_riders')

      - name: driver_id
        description: "FK to stg_drivers"
        data_tests:
          - not_null
          - relationships:
              arguments:
                field: driver_id
                to: ref('stg_drivers')

      - name: city_id
        description: "FK to stg_cities"
        data_tests:
          - not_null
          - relationships:
              arguments:
                field: city_id
                to: ref('stg_cities')

      - name: status
        description: "Trip status"
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['requested', 'accepted', 'completed', 'cancelled', 'no_show']

      - name: payment_status
        description: "Payment status from stg_payments via LEFT JOIN."
        data_tests:
          - accepted_values:
              arguments:
                values: ['success', 'failed']

      - name: payment_provider
        description:  "Payment provider"
        data_tests:
          - accepted_values:
              arguments:
                values: ['stripe', 'paypal']

      - name: trip_duration_minutes
        description: "Duration in minutes — 0 for cancelled/no_show trips"
        data_tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 0"

      - name: surge_multiplier
        description: "Surge multiplier applied to this trip"
        data_tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 1"

      - name: amount
        description: "Gross payment amount — 0 if no payment record exists"
        data_tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 0"

      - name: fee
        description: "Payment processing fee — 0 if no payment record exists"
        data_tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 0"

      - name: net_revenue
        description: "Net revenue after fee deduction (amount - fee via calculate_net_revenue macro)."
        data_tests:
          - not_null

      - name: corporate_trip_flag
        description: "1 if corporate trip, 0 otherwise"
        data_tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: "IN (0, 1)"

      - name: missing_payment_flag
        description: "1 if no payment record found for this trip"
        data_tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: "IN (0, 1)"

      - name: duplicate_payment_flag
        description: "1 if more than one payment record exists for this trip."
        data_tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: "IN (0, 1)"

      - name: invalid_payment_amount_flag
        description: "1 if fee > amount on the payment record."
        data_tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: "IN (0, 1)"

      - name: failed_payment_on_completed_trip_flag
        description: "1 if trip status is completed but payment was not successful."
        data_tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: "IN (0, 1)"

      - name: extreme_surge_flag
        description: "1 if surge multiplier exceeded 10 — anomaly/fraud indicator"
        data_tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: "IN (0, 1)"

      - name: requested_at
        description: "Timestamp when trip was requested"
        data_tests:
          - not_null

      - name: updated_at
        description: "Timestamp of last update — used as incremental cursor"
        data_tests:
          - not_null

    # Model-level custom tests
    #data_tests:
      # Custom singular tests — SQL files in tests/ folder
      # Each returns failing rows; test passes when zero rows returned
      #- negative_revenue
      #- trip_duration
      #- successful_payment_trip

      # Freshness guard: fails if trips_metrics has not been updated in last 2 hours
      #- dbt_utils.recency:
       #   arguments:
       #     datepart: hour
       #     field: updated_at
       #     interval: 2


  # DRIVER_METRICS
  - name: driver_metrics
    description: "Driver-level aggregated metrics"
    columns:
      - name: driver_id
        description: "Primary key — one row per driver"
        data_tests:
          - not_null
          - unique
          - relationships:
              arguments:
                field: driver_id
                to: ref('stg_drivers')

      - name: city_id
        description: "FK to stg_cities"
        data_tests:
          - not_null
          - relationships:
              arguments:
                field: city_id
                to: ref('stg_cities')

      - name: driver_status
        description: "Current driver status"
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['active', 'suspended', 'inactive']

      - name: driver_lifetime_trips
        description: "Total completed trips — 0 for new drivers"
        data_tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 0"

      - name: cancelled_trips
        description: "Count of cancelled trips"
        data_tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 0"

      - name: no_show_trips
        description: "Count of no_show trips"
        data_tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 0"

      - name: total_trip_attempts
        description: "All trips regardless of status"
        data_tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 0"

      - name: total_net_revenue_earned
        description: "Sum of net_revenue on completed trips — 0 for new drivers."
        data_tests:
          - not_null

      - name: extreme_surge_trips
        description: "Count of trips with extreme surge multiplier (> 10)"
        data_tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 0"

      - name: corporate_trips
        description: "Count of completed corporate trips"
        data_tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 0"

      - name: failed_payment_count
        description: "Count of completed trips with failed or missing payments"
        data_tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 0"

      - name: missing_payment_count
        description: "Count of trips with no payment record found"
        data_tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 0"

      - name: duplicate_payment_count
        description: "Count of trips with more than one payment record"
        data_tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 0"

      - name: invalid_payment_amount_count
        description: "Count of trips where fee > amount — fraud/data corruption signal."
        data_tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 0"

      - name: total_online_hours
        description: "Total hours driver was online — 0 if never logged on"
        data_tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 0"


  # RIDER_METRICS
  - name: rider_metrics
    description: "Rider-level aggregated metrics"
    columns:
      - name: rider_id
        description: "Primary key — one row per rider"
        data_tests:
          - not_null
          - unique
          - relationships:
              arguments:
                field: rider_id
                to: ref('stg_riders')

      - name: country
        description: "Country of rider — UK only for this project"
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['UK']

      - name: signup_date
        description: "Date rider signed up"
        data_tests:
          - not_null

      - name: most_frequent_city_id
        description: "City where the rider has taken the most completed trips."
        data_tests:
          - relationships:
              arguments:
                field: city_id
                to: ref('stg_cities')

      - name: is_referred_rider
        description: "True if rider signed up via a referral code"
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: [true, false]
                quote: false

      - name: total_trips
        description: "All trip attempts regardless of status"
        data_tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 0"

      - name: completed_trips
        description: "Count of completed trips"
        data_tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 0"

      - name: cancelled_trips
        description: "Count of cancelled trips"
        data_tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 0"

      - name: no_show_trips
        description: "Count of no_show trips"
        data_tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 0"

      - name: rider_lifetime_value
        description: "Sum of net_revenue on completed trips — 0 for new riders"
        data_tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 0"

      - name: missing_payment_count
        description: "Count of trips with no payment record found"
        data_tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 0"

      - name: duplicate_payment_count
        description: "Count of trips with more than one payment record"
        data_tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 0"

      - name: failed_payment_on_completed_count
        description: "Count of completed trips with failed or missing payments"
        data_tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 0"

      - name: invalid_payment_amount_count
        description: "Count of trips where fee > amount — fraud/data corruption signal."
        data_tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 0"

      - name: extreme_surge_trips
        description: "Count of trips with extreme surge multiplier (> 10)"
        data_tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 0"

      - name: corporate_trips
        description: "Count of corporate trips"
        data_tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 0"
version: 2

models:

  # -------------------------------------------------------------------------
  # STG_CITIES
  # -------------------------------------------------------------------------
  - name: stg_cities
    description: "Staging model for cities"
    columns:
      - name: city_id
        description: "Primary key for each city"
        data_tests:
          - not_null
          - unique

      - name: city_name
        description: "City name"
        data_tests:
          - not_null

      - name: country
        description: "Country of the city"
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['UK']

      - name: launch_date
        description: "Date the city was launched"
        data_tests:
          - not_null


  # -------------------------------------------------------------------------
  # STG_DRIVERS
  # -------------------------------------------------------------------------
  - name: stg_drivers
    description: "Staging model for drivers"
    columns:
      - name: driver_id
        description: "Primary key for drivers"
        data_tests:
          - not_null
          - unique

      - name: onboarding_date
        description: "Driver join date"
        data_tests:
          - not_null

      - name: driver_status
        description: "Driver status (active / suspended / inactive)"
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['active', 'suspended', 'inactive']

      - name: city_id
        description: "City assigned to driver"
        data_tests:
          - not_null
          - relationships:
              arguments:
                field: city_id
                to: ref('stg_cities')

      - name: vehicle_id
        description: "Vehicle assigned to driver — string identifier e.g. VH001"
        data_tests:
          - not_null

      - name: rating
        description: "Driver rating — intentionally nullable for new unrated drivers"

      - name: created_at
        description: "Record creation timestamp"
        data_tests:
          - not_null

      - name: updated_at
        description: "Record last update timestamp"
        data_tests:
          - not_null


  # -------------------------------------------------------------------------
  # STG_DRIVER_STATUS_EVENTS
  # -------------------------------------------------------------------------
  - name: stg_driver_status_events
    description: "Staging model for driver online/offline status events"
    columns:
      - name: event_id
        description: "Primary key for events"
        data_tests:
          - not_null
          - unique

      - name: driver_id
        description: "FK to stg_drivers"
        data_tests:
          - not_null
          - relationships:
              arguments:
                field: driver_id
                to: ref('stg_drivers')

      - name: status
        description: "Driver online/offline status"
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['online', 'offline']

      - name: event_timestamp
        description: "Timestamp of the status event"
        data_tests:
          - not_null


  # -------------------------------------------------------------------------
  # STG_PAYMENTS
  # -------------------------------------------------------------------------
  - name: stg_payments
    description: "Staging model for payments"
    columns:
      - name: payment_id
        description: "Primary key for payments"
        data_tests:
          - not_null
          - unique

      - name: trip_id
        description: "FK to stg_trips"
        data_tests:
          - not_null
          - relationships:
              arguments:
                field: trip_id
                to: ref('stg_trips')

      - name: payment_status
        description: "Payment status"
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['success', 'failed']

      - name: payment_provider
        description: "Payment provider"
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['stripe', 'paypal']

      - name: amount
        description: "Charged amount"
        data_tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 0"

      - name: fee
        description: "Processing fee"
        data_tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 0"

      - name: currency
        description: "Currency code"
        data_tests:
          - not_null

      - name: created_at
        description: "Payment creation timestamp"
        data_tests:
          - not_null


  # -------------------------------------------------------------------------
  # STG_RIDERS
  # -------------------------------------------------------------------------
  - name: stg_riders
    description: "Staging model for riders"
    columns:
      - name: rider_id
        description: "Primary key for riders"
        data_tests:
          - not_null
          - unique

      - name: signup_date
        description: "Rider signup date"
        data_tests:
          - not_null

      - name: country
        description: "Country of rider — UK only"
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['UK']

      - name: referral_code
        description: "Referral code if used — intentionally nullable for organic signups"

      - name: created_at
        description: "Record creation timestamp"
        data_tests:
          - not_null


  # -------------------------------------------------------------------------
  # STG_TRIPS
  # -------------------------------------------------------------------------
  - name: stg_trips
    description: "Staging model for trips"
    columns:
      - name: trip_id
        description: "Primary key for trips"
        data_tests:
          - not_null
          - unique

      - name: rider_id
        description: "FK to stg_riders"
        data_tests:
          - not_null
          - relationships:
              arguments:
                field: rider_id
                to: ref('stg_riders')

      - name: driver_id
        description: "FK to stg_drivers"
        data_tests:
          - not_null
          - relationships:
              arguments:
                field: driver_id
                to: ref('stg_drivers')

      - name: vehicle_id
        description: "Vehicle used in trip — string identifier e.g. VH001"
        data_tests:
          - not_null

      - name: city_id
        description: "FK to stg_cities"
        data_tests:
          - not_null
          - relationships:
              arguments:
                field: city_id
                to: ref('stg_cities')

      - name: requested_at
        description: "Timestamp when ride was requested"
        data_tests:
          - not_null

      - name: pickup_at
        description: "Pickup timestamp — nullable for cancelled/no_show trips"

      - name: dropoff_at
        description: "Dropoff timestamp — nullable for cancelled/no_show trips"

      - name: status
        description: "Trip status"
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['completed', 'cancelled', 'no_show']

      - name: estimated_fare
        description: "Initial fare estimate"
        data_tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 0"

      - name: actual_fare
        description: "Final fare charged"
        data_tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 0"

      - name: surge_multiplier
        description: "Applied surge multiplier — minimum 1 (no surge)"
        data_tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 1"

      - name: payment_method
        description: "Payment method used"
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['card', 'wallet', 'cash']

      - name: is_corporate
        description: "Boolean flag for corporate trip"
        data_tests:
          - not_null

      - name: created_at
        description: "Record creation timestamp"
        data_tests:
          - not_null

      - name: updated_at
        description: "Record last update timestamp"
        data_tests:
          - not_null
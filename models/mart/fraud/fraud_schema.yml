version: 2

models:

  # PAYMENT_REL_REPORT
  # Grain: 1 row per trip
  - name: payment_rel_report
    description: "Payment reliability report for the fraud team."
    config:
      meta:
        owner: fraud-team
        tags: ['fraud']
    columns:
      - name: trip_id
        description: "Primary key — one row per trip"
        data_tests:
          - not_null
          - unique
          - relationships:
              arguments:
                field: trip_id
                to: ref('fact_trips')

      - name: trip_date
        description: "Date of trip"
        data_tests:
          - not_null

      - name: city_id
        description: "FK to dim_cities"
        data_tests:
          - not_null
          - relationships:
              arguments:
                field: city_id
                to: ref('dim_cities')

      - name: driver_id
        description: "FK to dim_drivers"
        data_tests:
          - not_null
          - relationships:
              arguments:
                field: driver_id
                to: ref('dim_drivers')

      - name: rider_id
        description: "FK to dim_riders"
        data_tests:
          - not_null
          - relationships:
              arguments:
                field: rider_id
                to: ref('dim_riders')

      - name: missing_payment_flag
        description: "1 if no payment record found for this trip"
        data_tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: "IN (0, 1)"

      - name: duplicate_payment_flag
        description: "1 if more than one payment record exists for this trip"
        data_tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: "IN (0, 1)"

      - name: invalid_payment_amount_flag
        description: "1 if fee > amount — mathematically impossible in legitimate transactions"
        data_tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: "IN (0, 1)"

      - name: failed_payment_on_completed_trip_flag
        description: "1 if trip completed but payment was not successful"
        data_tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: "IN (0, 1)"

      - name: has_any_payment_issue
        description: >
          1 if any of the four payment flags is active on this trip.
        data_tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: "IN (0, 1)"

      - name: total_payment_attempts
        description: "Raw payment event count from fct_payments — includes duplicates"
        data_tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 0"

      - name: successful_payments
        description: "Count of payment events with status = success for this trip"
        data_tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 0"

      - name: failed_payments
        description: "Count of payment events with status = failed for this trip"
        data_tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 0"

      - name: driver_lifetime_failed_payments
        description: "Driver's total failed payment count across all trips — pattern signal"
        data_tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 0"

      - name: rider_lifetime_failed_payments
        description: "Rider's total failed payment count across all trips — pattern signal"
        data_tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 0"



  # FRAUD_MONITOR
  # Grain: 1 row per flagged trip

  - name: fraud_monitor
    description: "Live fraud monitoring feed for the fraud team."
    config:
      meta:
        owner: fraud-team
        tags: ['fraud']
    columns:
      - name: trip_id
        description: "Primary key — one row per flagged trip"
        data_tests:
          - not_null
          - unique

      - name: trip_date
        description: "Date of the flagged trip"
        data_tests:
          - not_null

      - name: city_id
        description: "FK to dim_cities"
        data_tests:
          - not_null
          - relationships:
              arguments:
                field: city_id
                to: ref('dim_cities')

      - name: driver_id
        description: "FK to dim_drivers"
        data_tests:
          - not_null
          - relationships:
              arguments:
                field: driver_id
                to: ref('dim_drivers')

      - name: rider_id
        description: "FK to dim_riders"
        data_tests:
          - not_null
          - relationships:
              arguments:
                field: rider_id
                to: ref('dim_riders')

      - name: extreme_surge_flag
        description: "1 if surge_multiplier > 10"
        data_tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: "IN (0, 1)"

      - name: duplicate_payment_flag
        description: "1 if more than one payment record exists"
        data_tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: "IN (0, 1)"

      - name: invalid_payment_amount_flag
        description: "1 if fee > amount"
        data_tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: "IN (0, 1)"

      - name: missing_payment_flag
        description: "1 if no payment record found"
        data_tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: "IN (0, 1)"

      - name: failed_payment_on_completed_trip_flag
        description: "1 if completed trip with failed payment"
        data_tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: "IN (0, 1)"

      - name: total_flags
        description: >
          Sum of all five fraud flags for this trip.
        data_tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 1"

      - name: driver_lifetime_extreme_surges
        description: "Driver's total extreme surge trips — repeat offender signal"
        data_tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 0"

      - name: driver_lifetime_failed_payments
        description: "Driver's total failed payment count — pattern signal"
        data_tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 0"

      - name: rider_lifetime_failed_payments
        description: "Rider's total failed payment count — pattern signal"
        data_tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 0"

      - name: requested_at
        description: "Timestamp when the flagged trip was requested"
        data_tests:
          - not_null
version: 2

models:

  # -------------------------------------------------------------------------
  # MART_PAYMENT_RELIABILITY
  # Grain: 1 row per trip
  # -------------------------------------------------------------------------
  - name: mart_payment_reliability
    description: >
      Payment reliability report for the fraud team.
      Combines trip-grain payment flags from fct_trips with raw payment
      event counts from fct_payments to give a complete picture of what
      happened at every payment attempt — not just the deduplicated outcome.
      Enriches with driver and rider lifetime payment context to help
      investigators identify patterns of payment abuse.
      Materialised as a full table refresh — fraud investigation requires
      the complete payment history, not just recent events.
    meta:
      owner: fraud-team
      tags: ['fraud']
    columns:
      - name: trip_id
        description: "Primary key — one row per trip"
        data_tests:
          - not_null
          - unique
          - relationships:
              arguments:
                field: trip_id
                to: ref('fct_trips')

      - name: trip_date
        description: "Date of trip"
        data_tests:
          - not_null

      - name: city_id
        description: "FK to dim_cities"
        data_tests:
          - not_null
          - relationships:
              arguments:
                field: city_id
                to: ref('dim_cities')

      - name: driver_id
        description: "FK to dim_drivers"
        data_tests:
          - not_null
          - relationships:
              arguments:
                field: driver_id
                to: ref('dim_drivers')

      - name: rider_id
        description: "FK to dim_riders"
        data_tests:
          - not_null
          - relationships:
              arguments:
                field: rider_id
                to: ref('dim_riders')

      - name: missing_payment_flag
        description: "1 if no payment record found for this trip"
        data_tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: "IN (0, 1)"

      - name: duplicate_payment_flag
        description: "1 if more than one payment record exists for this trip"
        data_tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: "IN (0, 1)"

      - name: invalid_payment_amount_flag
        description: "1 if fee > amount — mathematically impossible in legitimate transactions"
        data_tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: "IN (0, 1)"

      - name: failed_payment_on_completed_trip_flag
        description: "1 if trip completed but payment was not successful"
        data_tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: "IN (0, 1)"

      - name: has_any_payment_issue
        description: >
          1 if any of the four payment flags is active on this trip.
          Composite signal for quick filtering of all problematic trips.
        data_tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: "IN (0, 1)"

      - name: total_payment_attempts
        description: "Raw payment event count from fct_payments — includes duplicates"
        data_tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 0"

      - name: successful_payments
        description: "Count of payment events with status = success for this trip"
        data_tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 0"

      - name: failed_payments
        description: "Count of payment events with status = failed for this trip"
        data_tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 0"

      - name: driver_lifetime_failed_payments
        description: "Driver's total failed payment count across all trips — pattern signal"
        data_tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 0"

      - name: rider_lifetime_failed_payments
        description: "Rider's total failed payment count across all trips — pattern signal"
        data_tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 0"


  # -------------------------------------------------------------------------
  # MART_FRAUD_MONITORING
  # Grain: 1 row per flagged trip
  # -------------------------------------------------------------------------
  - name: mart_fraud_monitoring
    description: >
      Live fraud monitoring feed for the fraud team.
      Contains only trips with at least one active fraud flag — a filtered
      subset of fct_trips enriched with driver and rider context for triage.
      Fraud signals tracked:
        extreme_surge_flag                    → surge multiplier > 10
        duplicate_payment_flag                → more than one payment record
        invalid_payment_amount_flag           → fee > amount (impossible legitimately)
        missing_payment_flag                  → completed trip with no payment
        failed_payment_on_completed_trip_flag → completed trip with failed payment
      total_flags sums all active flags per trip as a triage priority score —
      higher values indicate trips requiring more urgent investigation.
      Incremental — new flagged trips append daily. Merge on trip_id handles
      retrospective flags (e.g. duplicate payment arriving the day after the trip).
    meta:
      owner: fraud-team
      tags: ['fraud']
    columns:
      - name: trip_id
        description: "Primary key — one row per flagged trip"
        data_tests:
          - not_null
          - unique

      - name: trip_date
        description: "Date of the flagged trip"
        data_tests:
          - not_null

      - name: city_id
        description: "FK to dim_cities"
        data_tests:
          - not_null
          - relationships:
              arguments:
                field: city_id
                to: ref('dim_cities')

      - name: driver_id
        description: "FK to dim_drivers"
        data_tests:
          - not_null
          - relationships:
              arguments:
                field: driver_id
                to: ref('dim_drivers')

      - name: rider_id
        description: "FK to dim_riders"
        data_tests:
          - not_null
          - relationships:
              arguments:
                field: rider_id
                to: ref('dim_riders')

      - name: extreme_surge_flag
        description: "1 if surge_multiplier > 10"
        data_tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: "IN (0, 1)"

      - name: duplicate_payment_flag
        description: "1 if more than one payment record exists"
        data_tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: "IN (0, 1)"

      - name: invalid_payment_amount_flag
        description: "1 if fee > amount"
        data_tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: "IN (0, 1)"

      - name: missing_payment_flag
        description: "1 if no payment record found"
        data_tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: "IN (0, 1)"

      - name: failed_payment_on_completed_trip_flag
        description: "1 if completed trip with failed payment"
        data_tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: "IN (0, 1)"

      - name: total_flags
        description: >
          Sum of all five fraud flags for this trip.
          Triage priority score — higher = more urgent investigation needed.
          Range: 1 to 5 (all trips in this model have at least 1 active flag).
        data_tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 1"

      - name: driver_lifetime_extreme_surges
        description: "Driver's total extreme surge trips — repeat offender signal"
        data_tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 0"

      - name: driver_lifetime_failed_payments
        description: "Driver's total failed payment count — pattern signal"
        data_tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 0"

      - name: rider_lifetime_failed_payments
        description: "Rider's total failed payment count — pattern signal"
        data_tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 0"

      - name: requested_at
        description: "Timestamp when the flagged trip was requested"
        data_tests:
          - not_null